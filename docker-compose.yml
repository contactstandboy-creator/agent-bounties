version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-bounties-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent_bounties
      POSTGRES_PASSWORD: agent_bounties_secret
      POSTGRES_DB: agent_bounties
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_bounties"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent-bounties-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment to run workers in Docker
  # workers:
  #   build: .
  #   command: npm run workers
  #   env_file: .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
